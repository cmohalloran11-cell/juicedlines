# World Cup prop model — tune here without touching code.
# Pick each data source: sample (built-in dummy) | csv (wc/data/files/*) | api (live).

sources:
  fixtures: sample
  strength: sample
  players:  sample
  odds:     sample

keys:            # env vars override these; leave blank to use sample/csv
  api_football: ""
  odds_api:     ""

model:
  n_sims:            10000    # Monte-Carlo iterations per fixture
  league_avg_goals:  1.35     # baseline goals / team / game
  home_advantage:    1.25     # attack multiplier for a host nation playing at home
  recency_decay:     0.55     # weight on recent form vs 12-month baseline (0..1)
  dc_rho:           -0.05     # Dixon-Coles low-score correction (0 = independent Poisson)
  max_goals:         10       # score-matrix truncation
  tempo_ref_goals:   2.7      # reference total match goals for SoT tempo scaling

intensity:                    # card-model multipliers
  knockout: 1.15              # elimination game
  rivalry:  1.10              # derby / historic rivalry flag

confidence:                   # start_prob -> flag
  confirmed: 0.85
  probable:  0.55
