name: refresh board

# Rebuilds static/board.json and force-pushes it to the `data` branch, which is served
# straight from GitHub raw (updates without a host redeploy → beats Vercel's ~100/day deploy
# cap). The page itself is served by Vercel from `main` (Root Directory = static).
#
# WHY THIS LOOPS INSTEAD OF JUST USING cron
# GitHub throttles scheduled workflows on free runners HARD: a `*/5` cron actually fires
# about once an HOUR, with observed multi-hour dead spots. That staleness — not the models —
# was the top reason the board "looked wrong". Triggering every 5 min from outside would
# need a personal access token, so instead ONE job stays alive and rebuilds on its own
# schedule. The cron below is now only a restarter: whenever no loop is running, the next
# fire starts one.
#
# COST CONTROL
#  * The loop only runs during the ACTIVE window (games + the hours lines actually move);
#    outside it, a run does a single rebuild and exits, so overnight costs ~nothing.
#  * Each job self-terminates after LOOP_HOURS so runners recycle and the checkout/token
#    stay fresh; a queued run picks up straight after.
#  * Most cycles are FAST (see FAST_REFRESH in build_static.py): board + line movement only,
#    ~100s. The full build — drawer analytics + CLV ledger — runs once an hour, because a
#    full build is 433s of which analytics.json alone is 331s and that data changes daily.

on:
  schedule:
    - cron: "*/5 * * * *"      # restarter only — GitHub throttles this to roughly hourly
  workflow_dispatch: {}         # manual "Run workflow" button
  push:
    branches: [main]            # rebuild immediately when the code changes

permissions:
  contents: write

concurrency:
  group: refresh-board
  # A push must PREEMPT a running loop so new code deploys at once. A scheduled fire must
  # NOT cancel it, or the loop would be killed every few minutes and never finish a cycle.
  # (With cancel disabled the extra fire just queues, and GitHub keeps one pending run per
  # group — which is exactly the restarter we want waiting for the loop to end.)
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 340          # hard stop below GitHub's 6h job cap
    env:
      LOOP_HOURS: "5"             # recycle the runner after this long (fewer restarts = fewer
                                  # cron-throttle gaps, since GITHUB_TOKEN can't self-retrigger)
      CYCLE_SECONDS: "300"        # target refresh cadence
      FULL_EVERY_SECONDS: "3600"  # how often to do a FULL build (analytics + ledger + trust.json)
      ACTIVE_START_UTC: "13"      # loop only between these UTC hours (wraps past midnight):
      ACTIVE_END_UTC: "7"         # 13:00–07:00 UTC ≈ 9am–3am ET — props post in the morning,
                                  # late West-coast games end ~2am ET, so this covers the day
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Rebuild + publish on a loop
        env:
          REMOTE: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        run: |
          set -u
          LOOP_UNTIL=$(( $(date -u +%s) + LOOP_HOURS * 3600 ))
          LAST_FULL=0
          PUBLISH_FAILS=0

          in_active_window () {
            H=$(date -u +%-H)
            if [ "$ACTIVE_START_UTC" -le "$ACTIVE_END_UTC" ]; then
              [ "$H" -ge "$ACTIVE_START_UTC" ] && [ "$H" -lt "$ACTIVE_END_UTC" ]
            else   # window wraps midnight (e.g. 13 → 7)
              [ "$H" -ge "$ACTIVE_START_UTC" ] || [ "$H" -lt "$ACTIVE_END_UTC" ]
            fi
          }
          mins_until_open () {   # minutes until the window next opens; 0 if inside it
            if in_active_window; then echo 0; return; fi
            NM=$(( $(date -u +%-H) * 60 + $(date -u +%-M) ))
            echo $(( (ACTIVE_START_UTC * 60 - NM + 1440) % 1440 ))
          }

          # Clone the data branch ONCE per job. A fresh `git init` + force-push shares no
          # objects with the remote, so it re-uploads EVERY file each cycle — analytics.json
          # (24MB) + clv.db (19MB) don't change on fast cycles, and re-sending them every 5
          # minutes is ~8GB/day. With a persistent clone we amend a single commit instead:
          # the branch stays flat (no history bloat, the reason it was force-pushed) AND git
          # only uploads blobs that actually changed (~8MB: board.json + history.json).
          # It also removes the wipe risk — files we don't rebuild are already in the clone,
          # so a skipped or failed step can no longer delete them from `data`.
          rm -rf _data
          git clone -q --single-branch --branch data "$REMOTE" _data 2>/dev/null \
            || { mkdir -p _data && cd _data && git init -q && git checkout -q -b data && cd ..; }
          git -C _data config user.name "github-actions[bot]"
          git -C _data config user.email "github-actions[bot]@users.noreply.github.com"

          publish () {
            cp static/board.json _data/board.json || return 1
            for f in analytics.json history.json clv.db board.free.json trust.json; do
              if [ -f "static/$f" ]; then cp "static/$f" "_data/$f"; fi
            done
            git -C _data add -A
            if git -C _data rev-parse HEAD >/dev/null 2>&1; then
              git -C _data commit -q --amend -m "board $(date -u +%FT%TZ)"
            else
              git -C _data commit -q -m "board $(date -u +%FT%TZ)"
            fi
            git -C _data push -f "$REMOTE" data
          }

          CYCLE=0
          run_cycle () {   # one build (mode chosen by the clock) + publish; updates PUBLISH_FAILS
            CYCLE=$(( CYCLE + 1 ))
            local START MODE; START=$(date -u +%s)
            if [ $(( START - LAST_FULL )) -ge "$FULL_EVERY_SECONDS" ]; then MODE=full; LAST_FULL=$START; else MODE=fast; fi
            echo "::group::cycle $CYCLE ($MODE) $(date -u +%T)Z"
            if [ "$MODE" = full ]; then
              python build_static.py || echo "build FAILED — keeping the previous board"
            else
              FAST_REFRESH=1 python build_static.py || echo "build FAILED — keeping the previous board"
            fi
            if publish; then PUBLISH_FAILS=0; else PUBLISH_FAILS=$(( PUBLISH_FAILS + 1 )); echo "publish FAILED ($PUBLISH_FAILS in a row)"; fi
            echo "::endgroup::"
            echo "cycle $CYCLE ($MODE) took $(( $(date -u +%s) - START ))s"
          }

          # Build every ~5 min WHILE in the game window. Outside it: if the window opens soon,
          # IDLE (keep the job alive and roll into the window) rather than exit — otherwise a run
          # that fires just before the window would exit and leave the board frozen until the
          # throttled cron happens to fire again (GITHUB_TOKEN can't self-retrigger). Far from
          # the window, do ONE refresh and exit so overnight fires don't idle a runner for hours.
          while :; do
            [ "$(date -u +%s)" -ge "$LOOP_UNTIL" ] && { echo "loop budget reached — exiting for a fresh run"; break; }
            if in_active_window; then
              CS=$(date -u +%s)
              run_cycle
              [ "$PUBLISH_FAILS" -ge 2 ] && { echo "publish failing repeatedly (token expired?) — exiting for a fresh run"; break; }
              SLEEP=$(( CYCLE_SECONDS - ($(date -u +%s) - CS) ))
              [ "$SLEEP" -gt 0 ] && { echo "sleeping ${SLEEP}s"; sleep "$SLEEP"; }
            else
              OPENS=$(mins_until_open)
              if [ "$OPENS" -le 25 ]; then
                echo "window opens in ${OPENS}m — idling to roll in"; sleep 300
              else
                echo "off-hours (${OPENS}m to window) — single refresh, then exit"; run_cycle; break
              fi
            fi
          done
